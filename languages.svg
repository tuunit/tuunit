<svg id="portable-dark-mode-support" width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  stroke: rgb(225, 228, 232);
  rx: 6px;
  ry: 6px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 24px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.75em;
  line-height: 24px;
  font-size: 16px;
  font-weight: 600;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 12px;
  margin-right: 1ch;
  align-items: center;
  flex-wrap: nowrap;
}

div.ellipsis {
  height: 176px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.octicon {
  margin-right: 0.5ch;
  vertical-align: top;
}

.progress {
  display: flex;
  height: 8px;
  overflow: hidden;
  border-radius: 6px;
  outline: 1px solid transparent;
  margin-bottom: 1em;
}

.progress-item {
  border-collapse: collapse;
}

.lang {
  font-weight: 600;
  margin-right: 4px;
}

@media (prefers-color-scheme: light) {
  #background {
    fill: #ffffff;
    stroke-width: 1px;
  }

  h2 {
    color: rgb(36, 41, 46);
    fill: rgb(36, 41, 46);
  }

  .octicon {
    fill: rgb(88, 96, 105);
  }

  .progress {
    background-color: rgb(225, 228, 232);
  }

  .progress-item {
    outline: 2px solid rgb(225, 228, 232);
  }

  .lang {
    color: rgb(36, 41, 46);
  }

  .percent {
    color: rgb(88, 96, 105);
  }
}

@media (prefers-color-scheme: dark) {
  #background {
    fill: #0d1117;
    stroke-width: 0.5px;
  }

  h2 {
    color: #c9d1d9;
    fill: #c9d1d9;
  }

  .octicon {
    color: #8b949e;
    fill: #8b949e;
  }

  .progress{
    background-color: rgba(110, 118, 129, 0.4);
  }

  .progress-item {
    outline: 2px solid #393f47;
  }

  .lang {
    color: #c9d1d9;
  }

  .percent {
    color: #8b949e;
  }
}
</style>
